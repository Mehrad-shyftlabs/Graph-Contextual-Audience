services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: serve
    ports:
      - "8000:8000"
    environment:
      AT_QDRANT_URL: http://qdrant:6333
      AT_LOG_LEVEL: INFO
      WEB_CONCURRENCY: 2
      # AT_API_KEY: changeme
      # AT_CORS_ORIGINS: '["https://app.example.com"]'
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  build-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    environment:
      AT_QDRANT_URL: http://qdrant:6333
      AT_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AT_DATA_DIR: /app/data
      AT_ENRICHED_DIR: /app/data/enriched
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    profiles:
      - build

volumes:
  qdrant_data:
